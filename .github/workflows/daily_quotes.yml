name: 🌟 Daily Quotes Generator

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

# 🌟🌟🌟 激熱ハッキング：小人さんに「書き込み権限」を与える！ 🌟🌟🌟
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    # 🌟🌟🌟 これを追加！未来のエンジン（Node24）を強制起動するスイッチ！ 🌟🌟🌟
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      # 🌟 警告対策：道具を最新の「v4」にバージョンアップ！
      - name: 📦 コードをチェックアウト
        uses: actions/checkout@v4

      # 🌟 警告対策：道具を最新の「v5」にバージョンアップ！
      - name: 🐍 Pythonの準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🤖 AIで名言を生成（Python実行）
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_quotes.py

      - name: 💾 生成されたテキストをGitHubに保存（Push）
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "✨ 本日の名言を更新！ [skip ci]" || echo "変更がありません"
          git push
